<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<style>

body{
    background:#f4f6f9;
    font-family:Arial;
}

.login-box{
    width:350px;
    margin:120px auto;
    background:white;
    padding:30px;
    border-radius:8px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.login-box h2{
    text-align:center;
    margin-bottom:25px;
}

.login-box input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

.login-box button{
    width:100%;
    padding:12px;
    background:#28a745;
    border:none;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

.login-box button:hover{
    background:#218838;
}

.error{
    color:red;
    text-align:center;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

{% if messages %}
    {% for message in messages %}
        <p class="error">{{ message }}</p>
    {% endfor %}
{% endif %}

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Username">

<input type="password" name="password" placeholder="Password">

<button type="submit">Login</button>

</form>

</div>

</body>

</html>
