
{% extends 'base.html' %}
{% block content %}
    
    <div class="container">
    <h2>Packet Entry</h2>
    
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    {% if messages %}
    {% for message in messages%}
    <div class="success">{{message}}</div>
    {% endfor %}
    {% endif %}


    <form method="POST">
        {% csrf_token %}

        <label>One KG Packets :</label>
        <input type="number" name="packet_one_kg" required ><br><br>

        <label>Half KG Packets :</label>
        <input type="number" name="packet_half_kg" required><br><br>

        <label>Price of One KG :</label>
        <input type="number" name="price_one_kg" required><br><br>

        <label>Price of Half KG :</label>
        <input type="number" name="price_half_kg"required><br><br>

        <button type="submit">Submit</button>

    </form>
</div>
{% endblock %}
